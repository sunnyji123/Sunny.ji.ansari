<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJ Real Estate & Builder | Client Portal</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #222;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #d4af37; /* Luxury Gold Border */
            box-shadow: 0px 4px 15px rgba(212, 175, 55, 0.2);
        }
        h2, h3 {
            color: #d4af37;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #555;
            background: #333;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            background: #d4af37;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }
        button:hover {
            background: #fff;
            color: #000;
        }
        .property-list {
            margin-top: 30px;
        }
        .property-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .property-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid #d4af37;
        }
        .price {
            color: #d4af37;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add New Property Listing</h2>
    <form id="propertyForm">
        <input type="text" id="title" placeholder="Property Title (e.g., 120 Sqyd Plot Dhabeji)" required>
        <input type="number" id="price" placeholder="Price in PKR" required>
        <input type="file" id="imageFile" accept="image/*" required>
        <button type="submit">Upload Property to Portal</button>
    </form>

    <hr style="border: 0.5px solid #333; margin: 30px 0;">

    <h2>Live Properties</h2>
    <div id="propertiesContainer" class="property-list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<script>
  // ⚠️ TRADING & REAL ESTATE NOTE: Replace these with your actual Firebase project keys
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const storage = firebase.storage();

  const form = document.getElementById('propertyForm');
  
  // Upload Process
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const title = document.getElementById('title').value;
    const price = document.getElementById('price').value;
    const imageFile = document.getElementById('imageFile').files[0];
    
    if(!imageFile) return alert("Please select an image first!");

    try {
      // 1. Image Upload to Firebase Storage
      const storageRef = storage.ref('properties/' + Date.now() + '_' + imageFile.name);
      const uploadTask = await storageRef.put(imageFile);
      const imageUrl = await uploadTask.ref.getDownloadURL();

      // 2. Save Details to Firestore Database
      await db.collection('listings').add({
        title: title,
        price: price,
        imageUrl: imageUrl,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      alert("Property uploaded and live successfully!");
      form.reset();
      
    } catch (error) {
      console.error(error);
      alert("Error: " + error.message);
    }
  });

  // Real-time Fetch & Display (Zameen.com Style)
  function fetchProperties() {
    db.collection('listings').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
      const container = document.getElementById('propertiesContainer');
      container.innerHTML = '';
      
      if(snapshot.empty) {
        container.innerHTML = '<p style="text-align:center; color:#666;">No properties uploaded yet.</p>';
        return;
      }

      snapshot.forEach((doc) => {
        const data = doc.data();
        container.innerHTML += `
          <div class="property-card">
            <img src="${data.imageUrl}" alt="Property Image">
            <h3>${data.title}</h3>
            <p class="price">PKR ${Number(data.price).toLocaleString()}</p>
          </div>
        `;
      });
    });
  }

  // Run on load
  fetchProperties();
</script>

</body>
</html>
