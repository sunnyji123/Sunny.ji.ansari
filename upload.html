<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Client Documents | Sunny Ji Ansari</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Sunny Ji Ansari</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="upload.html" class="active">Upload Files</a>
        </nav>
    </header>

    <section class="portal-container">
        <h3>Submit & Upload Property Documents</h3>
        <form id="uploadForm" onsubmit="handleUpload(event)">
            <div class="form-group">
                <label>Client Full Name</label>
                <input type="text" required id="clientName">
            </div>
            <div class="form-group">
                <label>Plot Number / Project</label>
                <input type="text" placeholder="e.g. Plot 45, Al Sadat Town" required id="plotDetails">
            </div>
            <div class="form-group">
                <label>Document Type</label>
                <select id="docType">
                    <option value="cnic">CNIC / Identity Proof</option>
                    <option value="receipt">Payment Receipt</option>
                    <option value="allotment">Allotment Letter</option>
                </select>
            </div>
            <div class="form-group">
                <label>Select File (Image or PDF)</label>
                <input type="file" required id="fileInput" style="padding:8px;">
            </div>
            <button type="submit" class="submit-btn">Upload to Portal</button>
        </form>
        <p id="msg" style="text-align:center; margin-top:15px; color:#d4af37; font-weight:bold;"></p>
    </section>

    <script>
        function handleUpload(e) {
            e.preventDefault();
            document.getElementById('msg').innerText = "🔄 Uploading file securely to server...";
            setTimeout(() => {
                document.getElementById('msg').innerText = "✅ Success! File uploaded and connected to Client Portal.";
                document.getElementById('uploadForm').reset();
            }, 2000);
        }
    </script>
</body>
</html>
