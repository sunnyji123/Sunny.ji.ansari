<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Sadat Town - Portal</title>
</head>
<body style="background-color: #060b13; color: #fff; font-family: Arial, sans-serif; padding: 20px;">

    <div style="max-width: 450px; margin: auto; display: flex; flex-direction: column; gap: 20px;">

        <div style="border: 1px solid #1e293b; border-radius: 12px; background: #0f172a; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
            <img src="https://i.ibb.co/VWV3mX7/IMG-20260702-WA0047.jpg" alt="120 Sq Yards Plot" style="width: 100%; height: auto; display: block;">
            
            <div style="padding: 20px;">
                <h3 style="color: #fff; margin: 0 0 8px 0; font-size: 20px; font-weight: bold;">120 Sq Yards Residential Plot</h3>
                <p style="color: #e5b842; margin: 0 0 20px 0; font-size: 15px;">📍 Dhabeji Market | <span style="color: #e5b842; font-weight: bold;">RESIDENTIAL</span></p>
                <button style="background: #e5b842; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; border-radius: 8px; font-size: 16px; cursor: pointer;">Available</button>
            </div>
        </div>

        <div style="border: 1px solid #1e293b; border-radius: 12px; background: #0f172a; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
            <img src="https://i.ibb.co/VWV3mX7/IMG-20260702-WA0047.jpg" alt="Booking Form" style="width: 100%; height: auto; display: block;">
            
            <div style="padding: 20px;">
                <h3 style="color: #fff; margin: 0 0 8px 0; font-size: 20px; font-weight: bold;">Booking File Submission Form</h3>
                <p style="color: #e5b842; margin: 0 0 20px 0; font-size: 15px;">📍 Main Office Counter | <span style="color: #e5b842; font-weight: bold;">RESIDENTIAL</span></p>
                <button style="background: #e5b842; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; border-radius: 8px; font-size: 16px; cursor: pointer;">Open</button>
            </div>
        </div>

    </div>

</body>
</html>
