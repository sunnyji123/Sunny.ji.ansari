<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects & Inventory | Sunny Ji Ansari</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .search-box { margin-bottom: 20px; width: 100%; padding: 12px; background: #161f30; border: 1px solid #d4af37; color: white; border-radius: 6px; }
        .grid { display: flex; flex-direction: column; gap: 15px; }
        .card { background: #161f30; border: 1px solid #233149; padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: rgba(212, 175, 55, 0.2); color: #d4af37; padding: 5px 10px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Sunny Ji Ansari</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html" class="active">Projects</a>
            <a href="gallery.html">Gallery</a>
            <a href="upload.html">Upload Files</a>
        </nav>
    </header>

    <section class="portal-container" style="max-width: 800px;">
        <h3>Al Sadat Town - Live Inventory Portal</h3>
        <input type="text" id="searchBar" class="search-box" placeholder="Search plot size, category or status..." onkeyup="searchInventory()">
        
        <div class="grid" id="inventoryGrid">
            </div>
    </section>

    <script>
        const inventory = [
            { title: "80 Sq Yards Residential Plot", type: "residential", action: "buy", location: "Dhabeji Market", status: "Available" },
            { title: "120 Sq Yards Commercial Plot", type: "commercial", action: "invest", location: "Dhabeji Market", status: "Premium Booking" },
            { title: "120 Sq Yards Luxury House", type: "houses", action: "buy", location: "Al Sadat Town", status: "Ready to Move" },
            { title: "Booking File Submission Form", type: "residential", action: "sell", location: "Main Office Counter", status: "Open" }
        ];

        function displayInventory(data) {
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = "";
            data.forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        <div>
                            <h4 style="color:#fff; margin-bottom:5px;">${item.title}</h4>
                            <p style="color:#aaa; font-size:0.9rem;">📍 ${item.location} | Category: ${item.type.toUpperCase()}</p>
                        </div>
                        <div class="badge">${item.status}</div>
                    </div>
                `;
            });
        }

        function searchInventory() {
            const val = document.getElementById('searchBar').value.toLowerCase();
            const filtered = inventory.filter(i => i.title.toLowerCase().includes(val) || i.type.toLowerCase().includes(val) || i.status.toLowerCase().includes(val));
            displayInventory(filtered);
        }

        // Auto filter based on Home Page clicks
        const urlParams = new URLSearchParams(window.location.search);
        const filterParam = urlParams.get('filter');
        if(filterParam) {
            const filtered = inventory.filter(i => i.type === filterParam || i.action === filterParam);
            displayInventory(filtered);
        } else {
            displayInventory(inventory);
        }
    </script>
</body>
</html>
