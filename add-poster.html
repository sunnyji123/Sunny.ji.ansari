<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Poster - AJ Real Estate</title>
</head>
<body style="background: #000; color: #fff; font-family: Arial; padding: 20px; text-align: center;">

    <div style="border: 2px solid #d4af37; padding: 20px; max-width: 450px; margin: auto; background: #111; border-radius: 8px;">
        <h2 style="color: #d4af37; margin-top: 0;">Naya Poster Add Karen</h2>
        
        <input type="text" id="imgUrl" placeholder="Yahan Photo Ka Link Paste Karen" 
               style="width: 90%; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #d4af37; background: #222; color: #fff;">
        
        <button id="saveBtn" style="background: #d4af37; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; width: 95%; border-radius: 4px;">
            Website Par Bhejen
        </button>
        
        <p id="msg" style="color: #00ff00; font-weight: bold; margin-top: 15px;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Aapka Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyADC693uEi9PKJqiTcyyZ8eJHa9b26xp1I",
            authDomain: "sunnyji123-f3c0d.firebaseapp.com",
            projectId: "sunnyji123-f3c0d",
            storageBucket: "sunnyji123-f3c0d.firebasestorage.app",
            messagingSenderId: "719753127340",
            appId: "1:719753127340:web:29978e55e80ec4b5858609"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const url = document.getElementById('imgUrl').value;
            if(!url) return alert("Pehle link paste karen!");

            document.getElementById('msg').innerText = "Uploading...";
            
            try {
                // Database mein link aur time save ho raha hai
                await addDoc(collection(db, "aj_posters"), {
                    image: url,
                    time: Date.now()
                });
                document.getElementById('msg').innerText = "Kamyabi se upload ho gaya!";
                document.getElementById('imgUrl').value = "";
            } catch (e) {
                document.getElementById('msg').innerText = "Error: Firestore Rules check karen.";
            }
        });
    </script>
</body>
</html>
